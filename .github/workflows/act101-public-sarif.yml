name: act101 Public SARIF Validation

on:
  workflow_dispatch:

permissions:
  actions: read
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  act101-scan:
    name: act101 Public SARIF Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run act101 scan
        uses: act101-ai/scan-action@v1
        with:
          oidc-audience: act101-scan
          token-endpoint: https://stg.act101.ai/api/scan/token
          upload-sarif: "true"
