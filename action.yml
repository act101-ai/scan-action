name: "act101 online scan"
description: "Run the act101 AI-code health scanner from GitHub Actions."
author: "act101"

branding:
  icon: "shield"
  color: "orange"

inputs:
  oidc-audience:
    description: "GitHub OIDC audience used when requesting an identity token."
    required: false
    default: "act101-scan"
  token-endpoint:
    description: "act101 Worker endpoint that exchanges GitHub OIDC for a scan token."
    required: false
    default: "https://act101.ai/api/scan/token"
  upload-sarif:
    description: "Upload SARIF to GitHub code scanning when available. This is optional and usually requires GitHub Advanced Security on private repositories."
    required: false
    default: "false"
  install-act:
    description: "Install the act CLI before scanning."
    required: false
    default: "true"
  act-channel:
    description: "act CLI release channel to install when install-act is true."
    required: false
    default: "stable"
  act-version:
    description: "Optional act CLI version tag to install instead of resolving the channel."
    required: false
    default: ""
  act-command:
    description: "Command used to run the act CLI."
    required: false
    default: "act"
  pr-comment:
    description: "PR comment behavior on pull_request events: sticky (one marker-keyed comment, updated in place), inline (legacy per-finding review comments), or off."
    required: false
    default: "sticky"
  license-key:
    description: "Optional act101 license key (e.g. an Ultimate/Enterprise signed key). When set, the scan is entitled by the license instead of the GitHub-OIDC scan token. Provide via a secret."
    required: false
    default: ""
  arena:
    description: "Post the public-repo full-scan score to the act101 leaderboard ingest (POST /api/scan/counter). Set arena: false to opt a repo out of the boards (its own score-history chart is still kept). Only fires on push to the default branch, for public repos, with a finite published score, and when the GitHub-OIDC scan token path is in use (license-key scans never post). pull_request runs still get a diff-scoped comment and full report but do not update the boards."
    required: false
    default: "true"
  gate-fail-on:
    description: "Which act gate verdicts fail the check on pull_request: 'review' (fail on BLOCK and REVIEW, the default) or 'block' (fail on BLOCK only; REVIEW posts a ::notice and passes). MERGE always passes; UNKNOWN and exec-error are always non-fatal."
    required: false
    default: "review"

runs:
  using: "composite"
  steps:
    - name: Exchange GitHub OIDC for act101 scan token
      id: token
      if: ${{ inputs.license-key == '' }}
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::warning::GitHub OIDC is not available. Ensure the workflow grants id-token: write."
          echo "token_available=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        request_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.oidc-audience }}"
        oidc_json="$(curl --fail --silent --show-error --location \
          --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "$request_url")"
        oidc_token="$(OIDC_JSON="$oidc_json" node -e 'const data = JSON.parse(process.env.OIDC_JSON); process.stdout.write(data.value || "");')"

        if [ -z "$oidc_token" ]; then
          echo "::warning::GitHub OIDC response did not contain a token."
          echo "token_available=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # The raw GitHub OIDC JWT is the trust root for the leaderboard ingest
        # (POST /api/scan/counter re-verifies it via verifyGithubOidc). Retain it
        # in the env so the post-scan-counter step can present it as the Bearer.
        # Mask it — a short-lived (≤6m) signed JWT, but still a credential.
        echo "::add-mask::$oidc_token"
        echo "ACT_OIDC_TOKEN=$oidc_token" >> "$GITHUB_ENV"

        # Exchange the OIDC token for a scan JWT. For a private repo with no
        # active entitlement the first /token call 402s; the script then redeems
        # the account's one free private-repo scan via /api/scan/claim-free-scan
        # and retries. It writes ACT_SCAN_TOKEN + token_available itself.
        OIDC_TOKEN="$oidc_token" \
        TOKEN_ENDPOINT="${{ inputs.token-endpoint }}" \
        node "${{ github.action_path }}/scripts/exchange-token.mjs"

    - name: Install act CLI
      if: ${{ inputs.install-act == 'true' }}
      shell: bash
      env:
        ACT_CHANNEL: ${{ inputs.act-channel }}
        ACT_VERSION: ${{ inputs.act-version }}
        ACT_ENABLE_DAEMON: no
        ACT_AUTO_START: no
        ACT_INSTALL_CLAUDE_PLUGIN: no
        ACT_NON_INTERACTIVE: "1"
        ACT_PREFIX: ${{ runner.temp }}/act101/bin
      run: |
        set -euo pipefail

        mkdir -p "$ACT_PREFIX"
        if [ -z "${ACT_VERSION:-}" ]; then
          releases_file="$(mktemp)"
          curl --fail --silent --show-error --location \
            --output "$releases_file" \
            https://api.github.com/repos/act101-ai/act101/releases?per_page=20
          export ACT_VERSION="$(CHANNEL="$ACT_CHANNEL" node -e 'const fs = require("fs"); const releases = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const channel = process.env.CHANNEL || "stable"; const rel = releases.find((rel) => !rel.draft && (channel === "stable" ? !rel.prerelease : (rel.prerelease && rel.tag_name.includes(channel)))); if (!rel) { process.stderr.write(`No ${channel} act release found\n`); process.exit(1); } process.stdout.write(rel.tag_name);' "$releases_file")"
        fi
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os/$arch" in
          Linux/x86_64|Linux/amd64) target="x86_64-unknown-linux-gnu" ;;
          Linux/aarch64|Linux/arm64) target="aarch64-unknown-linux-gnu" ;;
          Darwin/x86_64) target="x86_64-apple-darwin" ;;
          Darwin/arm64|Darwin/aarch64) target="aarch64-apple-darwin" ;;
          *) echo "Unsupported runner platform: $os/$arch" >&2; exit 1 ;;
        esac
        archive_url="https://github.com/act101-ai/act101/releases/download/${ACT_VERSION}/act-${target}.tar.gz"
        archive_path="$(mktemp)"
        curl --fail --silent --show-error --location \
          --output "$archive_path" \
          "$archive_url"
        tar -xzf "$archive_path" -C "$ACT_PREFIX"
        chmod +x "$ACT_PREFIX/act"
        echo "$ACT_PREFIX" >> "$GITHUB_PATH"
        "$ACT_PREFIX/act" --version

    - name: Run diff-scoped act101 PR scan
      id: pr-scan
      if: ${{ github.event_name == 'pull_request' && inputs.pr-comment != 'off' }}
      shell: bash
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        ACT_LICENSE_KEY: ${{ inputs.license-key }}
      run: |
        set -euo pipefail

        visibility="$(EVENT_PATH="${GITHUB_EVENT_PATH:-}" node -e 'const fs = require("fs"); const event = process.env.EVENT_PATH && fs.existsSync(process.env.EVENT_PATH) ? JSON.parse(fs.readFileSync(process.env.EVENT_PATH, "utf8")) : {}; process.stdout.write(event.repository && event.repository.private ? "private" : "public");')"

        # Capability detection: diff-scoped scan flags exist only in newer CLI releases.
        capable=false
        if command -v "${{ inputs.act-command }}" >/dev/null 2>&1; then
          if "${{ inputs.act-command }}" scan --help 2>/dev/null | grep -q -- "--base-ref" && \
             "${{ inputs.act-command }}" scan --help 2>/dev/null | grep -q -- "--format"; then
            capable=true
          else
            echo "::notice::Installed act CLI predates diff-scoped scans; posting a full-scan report instead."
          fi
        else
          echo "::notice::act CLI is not available; posting a full-scan report instead."
        fi

        if [ "$capable" != "true" ]; then
          echo "conclusion=success" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git fetch --no-tags origin "$BASE_REF" || \
          echo "::notice::Could not fetch base ref ${BASE_REF}; the diff-scoped scan may not find a merge base."

        args=(scan --visibility "$visibility" --root . --base-ref "origin/${BASE_REF}" --format markdown)
        if [ -f .act/baseline.json ]; then
          args+=(--baseline .act/baseline.json)
        fi
        set +e
        "${{ inputs.act-command }}" "${args[@]}" > act101-comment.md 2> act101-pr-scan.stderr
        scan_exit=$?
        set -e
        case "$scan_exit" in
          0) echo "conclusion=success" >> "$GITHUB_OUTPUT" ;;
          1) echo "conclusion=failure" >> "$GITHUB_OUTPUT" ;;
          *)
            echo "::notice::Diff-scoped scan could not run (exit ${scan_exit}): $(head -3 act101-pr-scan.stderr | tr '\n' ' '). Falling back to the full-scan report."
            rm -f act101-comment.md
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Run act101 scan and write report
      id: report
      shell: bash
      env:
        ACT_LICENSE_KEY: ${{ inputs.license-key }}
      run: |
        set -euo pipefail

        visibility="$(EVENT_PATH="${GITHUB_EVENT_PATH:-}" node -e 'const fs = require("fs"); const event = process.env.EVENT_PATH && fs.existsSync(process.env.EVENT_PATH) ? JSON.parse(fs.readFileSync(process.env.EVENT_PATH, "utf8")) : {}; process.stdout.write(event.repository && event.repository.private ? "private" : "public");')"
        sarif_status="not requested"
        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          sarif_status="requested"
        fi

        if command -v "${{ inputs.act-command }}" >/dev/null 2>&1; then
          if "${{ inputs.act-command }}" scan --visibility "$visibility" --root . > act101-scan-raw.json 2> act101-scan.stderr && \
             "${{ inputs.act-command }}" scan --visibility "$visibility" --root . --sarif > act101-results.sarif 2>> act101-scan.stderr; then
            node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
              --input act101-scan-raw.json \
              --out-dir act101-report \
              --sarif-status "$sarif_status"
            echo "scan_available=true" >> "$GITHUB_OUTPUT"
          else
            reason="$(cat act101-scan.stderr)"
            node "$GITHUB_ACTION_PATH/scripts/local-scan.mjs" . > act101-scan-raw.json
            node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
              --input act101-scan-raw.json \
              --out-dir act101-report \
              --sarif-status "$sarif_status"
            node "$GITHUB_ACTION_PATH/scripts/write-sarif.mjs" act101-report.json act101-results.sarif
            echo "::notice::The configured act CLI did not complete; used the bundled act101 launch scanner instead. ${reason}"
            echo "scan_available=true" >> "$GITHUB_OUTPUT"
          fi
        else
          node "$GITHUB_ACTION_PATH/scripts/local-scan.mjs" . > act101-scan-raw.json
          node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
            --input act101-scan-raw.json \
            --out-dir act101-report \
            --sarif-status "$sarif_status"
          node "$GITHUB_ACTION_PATH/scripts/write-sarif.mjs" act101-report.json act101-results.sarif
          echo "scan_available=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Post act101 leaderboard counter
      id: counter
      if: ${{ inputs.arena != 'false' && inputs.license-key == '' && steps.token.outputs.token_available == 'true' && steps.report.outputs.scan_available == 'true' && (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
      shell: bash
      env:
        ACT_OIDC_TOKEN: ${{ env.ACT_OIDC_TOKEN }}
        TOKEN_ENDPOINT: ${{ inputs.token-endpoint }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/scripts/post-scan-counter.mjs"

    - name: Attach act101 report artifact
      uses: actions/upload-artifact@v7
      with:
        name: act101-report
        path: act101-report/
        if-no-files-found: error

    - name: Post act101 sticky PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.pr-comment == 'sticky' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/scripts/sticky-comment.mjs"

    - name: Post act101 PR review comments (legacy inline mode)
      if: ${{ github.event_name == 'pull_request' && inputs.pr-comment == 'inline' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/scripts/post-pr-comments.mjs"

    - name: Run act gate (authoritative safe-to-merge verdict)
      id: act-gate
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        GATE_FAIL_ON: ${{ inputs.gate-fail-on }}
      run: |
        set -uo pipefail

        # Capability detection: act gate and its --base-ref flag exist only in
        # newer CLI releases. Predates gate → skip (the scan-exit conclusion
        # below remains the fallback).
        if ! command -v "${{ inputs.act-command }}" >/dev/null 2>&1; then
          echo "gate_available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::act CLI is not installed; skipping act gate."
          exit 0
        fi
        if ! "${{ inputs.act-command }}" gate --help 2>/dev/null | grep -q -- "--base-ref"; then
          echo "gate_available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Installed act CLI predates 'act gate'; skipping the gate verdict."
          exit 0
        fi
        echo "gate_available=true" >> "$GITHUB_OUTPUT"

        # The base ref must be present locally for merge-base(<base>, HEAD).
        git fetch --no-tags origin "$BASE_REF" || \
          echo "::notice::Could not fetch base ref ${BASE_REF}; act gate may fall back to the working-tree scope."

        # act gate exit contract (commands/gate.rs exit_code_for + main.rs Err arm):
        #   0 MERGE / 1 BLOCK / 2 REVIEW / 3 UNKNOWN / 4 exec-error
        fail_on="${GATE_FAIL_ON:-review}"
        set +e
        "${{ inputs.act-command }}" gate --base-ref "origin/${BASE_REF}" --format json > act101-gate.json 2> act101-gate.stderr
        gate_exit=$?
        set -e

        case "$gate_exit" in
          0)
            echo "verdict=merge" >> "$GITHUB_OUTPUT"
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "act gate: MERGE — no changed function needs review."
            ;;
          1)
            echo "verdict=block" >> "$GITHUB_OUTPUT"
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "::error::act gate: BLOCK — one or more changed functions failed verification. See act101-gate.json."
            exit 1
            ;;
          2)
            echo "verdict=review" >> "$GITHUB_OUTPUT"
            if [ "$fail_on" = "review" ]; then
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "::error::act gate: REVIEW — a changed function needs human review (gate-fail-on=review). See act101-gate.json."
              exit 1
            fi
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "::notice::act gate: REVIEW — a changed function needs human review (gate-fail-on=${fail_on}, non-fatal)."
            ;;
          3)
            echo "verdict=unknown" >> "$GITHUB_OUTPUT"
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "::notice::act gate returned UNKNOWN (tier-blocked or undecidable); treated as non-fatal. See act101-gate.json."
            ;;
          *)
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            echo "conclusion=success" >> "$GITHUB_OUTPUT"
            echo "::notice::act gate could not run (exit ${gate_exit}): $(head -3 act101-gate.stderr | tr '\n' ' '). Treated as non-fatal."
            ;;
        esac

    - name: Enforce scan gate conclusion
      if: ${{ github.event_name == 'pull_request' && steps.pr-scan.outputs.conclusion == 'failure' }}
      shell: bash
      run: |
        echo "::error::act101 scan gate failed — new findings vs the committed baseline (see the PR comment)."
        exit 1

    - name: Check GitHub code scanning availability
      id: code-scanning
      if: ${{ inputs.upload-sarif == 'true' && steps.report.outputs.scan_available == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        echo "available=false" >> "$GITHUB_OUTPUT"

        if [ -z "${GH_TOKEN:-}" ] || [ -z "${GITHUB_REPOSITORY:-}" ]; then
          {
            echo ""
            echo "SARIF upload skipped: GitHub token or repository context was unavailable."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        repo_file="$(mktemp)"
        repo_status="$(curl --silent --show-error --location \
          --output "$repo_file" \
          --write-out "%{http_code}" \
          --header "Authorization: Bearer ${GH_TOKEN}" \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}")"

        if [ "$repo_status" -lt 200 ] || [ "$repo_status" -ge 300 ]; then
          {
            echo ""
            echo "SARIF upload skipped: repository metadata request returned HTTP ${repo_status}."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        is_private="$(REPO_JSON="$(cat "$repo_file")" node -e 'const data = JSON.parse(process.env.REPO_JSON); process.stdout.write(data.private ? "true" : "false");')"
        if [ "$is_private" != "true" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        alerts_file="$(mktemp)"
        alerts_status="$(curl --silent --show-error --location \
          --output "$alerts_file" \
          --write-out "%{http_code}" \
          --header "Authorization: Bearer ${GH_TOKEN}" \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1")"

        if [ "$alerts_status" -ge 200 ] && [ "$alerts_status" -lt 300 ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo ""
          echo "SARIF upload skipped: GitHub code scanning is not enabled for this private repository."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload act101 SARIF
      if: ${{ inputs.upload-sarif == 'true' && steps.report.outputs.scan_available == 'true' && steps.code-scanning.outputs.available == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: act101-results.sarif
