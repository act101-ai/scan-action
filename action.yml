name: "act101 online scan"
description: "Run the act101 AI-code health scanner from GitHub Actions."
author: "act101"

branding:
  icon: "shield"
  color: "orange"

inputs:
  oidc-audience:
    description: "GitHub OIDC audience used when requesting an identity token."
    required: false
    default: "act101-scan"
  token-endpoint:
    description: "act101 Worker endpoint that exchanges GitHub OIDC for a scan token."
    required: false
    default: "https://act101.ai/api/scan/token"
  upload-sarif:
    description: "Upload SARIF to GitHub code scanning when available. This is optional and usually requires GitHub Advanced Security on private repositories."
    required: false
    default: "false"
  install-act:
    description: "Install the act CLI before scanning."
    required: false
    default: "true"
  act-channel:
    description: "act CLI release channel to install when install-act is true."
    required: false
    default: "beta"
  act-version:
    description: "Optional act CLI version tag to install instead of resolving the channel."
    required: false
    default: ""
  act-command:
    description: "Command used to run the act CLI."
    required: false
    default: "act"

runs:
  using: "composite"
  steps:
    - name: Exchange GitHub OIDC for act101 scan token
      id: token
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::warning::GitHub OIDC is not available. Ensure the workflow grants id-token: write."
          echo "token_available=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        request_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.oidc-audience }}"
        oidc_json="$(curl --fail --silent --show-error --location \
          --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "$request_url")"
        oidc_token="$(OIDC_JSON="$oidc_json" node -e 'const data = JSON.parse(process.env.OIDC_JSON); process.stdout.write(data.value || "");')"

        if [ -z "$oidc_token" ]; then
          echo "::warning::GitHub OIDC response did not contain a token."
          echo "token_available=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        response_file="$(mktemp)"
        status_code="$(curl --silent --show-error --location \
          --output "$response_file" \
          --write-out "%{http_code}" \
          --request POST \
          --header "Authorization: Bearer ${oidc_token}" \
          --header "Content-Type: application/json" \
          --data '{}' \
          "${{ inputs.token-endpoint }}")"

        if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
          body="$(cat "$response_file")"
          echo "::warning::act101 scan token exchange returned HTTP ${status_code}: ${body}"
          echo "token_available=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        scan_token="$(TOKEN_RESPONSE="$(cat "$response_file")" node -e 'const data = JSON.parse(process.env.TOKEN_RESPONSE); process.stdout.write(data.token || "");')"
        if [ -n "$scan_token" ]; then
          echo "::add-mask::$scan_token"
          echo "token_available=true" >> "$GITHUB_OUTPUT"
          echo "ACT_SCAN_TOKEN=$scan_token" >> "$GITHUB_ENV"
        else
          echo "::warning::act101 token response did not contain a scan token."
          echo "token_available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install act CLI
      if: ${{ inputs.install-act == 'true' }}
      shell: bash
      env:
        ACT_CHANNEL: ${{ inputs.act-channel }}
        ACT_VERSION: ${{ inputs.act-version }}
        ACT_ACCEPT_TOS: yes
        ACT_ENABLE_DAEMON: no
        ACT_AUTO_START: no
        ACT_INSTALL_CLAUDE_PLUGIN: no
        ACT_NON_INTERACTIVE: "1"
        ACT_PREFIX: ${{ runner.temp }}/act101/bin
      run: |
        set -euo pipefail

        mkdir -p "$ACT_PREFIX"
        if [ -z "${ACT_VERSION:-}" ]; then
          releases_file="$(mktemp)"
          curl --fail --silent --show-error --location \
            --output "$releases_file" \
            https://api.github.com/repos/act101-ai/act101/releases?per_page=20
          export ACT_VERSION="$(CHANNEL="$ACT_CHANNEL" node -e 'const fs = require("fs"); const releases = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const channel = process.env.CHANNEL || "stable"; const rel = releases.find((rel) => rel.prerelease && !rel.draft && rel.tag_name.includes(channel)); if (!rel) { process.stderr.write(`No ${channel} act release found\n`); process.exit(1); } process.stdout.write(rel.tag_name);' "$releases_file")"
        fi
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os/$arch" in
          Linux/x86_64|Linux/amd64) target="x86_64-unknown-linux-gnu" ;;
          Linux/aarch64|Linux/arm64) target="aarch64-unknown-linux-gnu" ;;
          Darwin/x86_64) target="x86_64-apple-darwin" ;;
          Darwin/arm64|Darwin/aarch64) target="aarch64-apple-darwin" ;;
          *) echo "Unsupported runner platform: $os/$arch" >&2; exit 1 ;;
        esac
        archive_url="https://github.com/act101-ai/act101/releases/download/${ACT_VERSION}/act-${target}.tar.gz"
        archive_path="$(mktemp)"
        curl --fail --silent --show-error --location \
          --output "$archive_path" \
          "$archive_url"
        tar -xzf "$archive_path" -C "$ACT_PREFIX"
        chmod +x "$ACT_PREFIX/act"
        echo "$ACT_PREFIX" >> "$GITHUB_PATH"
        "$ACT_PREFIX/act" --version
        "$ACT_PREFIX/act" tos accept

    - name: Run act101 scan and write report
      id: report
      shell: bash
      run: |
        set -euo pipefail

        visibility="$(EVENT_PATH="${GITHUB_EVENT_PATH:-}" node -e 'const fs = require("fs"); const event = process.env.EVENT_PATH && fs.existsSync(process.env.EVENT_PATH) ? JSON.parse(fs.readFileSync(process.env.EVENT_PATH, "utf8")) : {}; process.stdout.write(event.repository && event.repository.private ? "private" : "public");')"
        sarif_status="not requested"
        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          sarif_status="requested"
        fi

        if command -v "${{ inputs.act-command }}" >/dev/null 2>&1; then
          if "${{ inputs.act-command }}" scan --visibility "$visibility" --root . > act101-scan-raw.json 2> act101-scan.stderr && \
             "${{ inputs.act-command }}" scan --visibility "$visibility" --root . --sarif > act101-results.sarif 2>> act101-scan.stderr; then
            node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
              --input act101-scan-raw.json \
              --out-dir act101-report \
              --sarif-status "$sarif_status"
            echo "scan_available=true" >> "$GITHUB_OUTPUT"
          else
            reason="$(cat act101-scan.stderr)"
            node "$GITHUB_ACTION_PATH/scripts/local-scan.mjs" . > act101-scan-raw.json
            node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
              --input act101-scan-raw.json \
              --out-dir act101-report \
              --sarif-status "$sarif_status"
            node "$GITHUB_ACTION_PATH/scripts/write-sarif.mjs" act101-report.json act101-results.sarif
            echo "::notice::The configured act CLI did not complete; used the bundled act101 launch scanner instead. ${reason}"
            echo "scan_available=true" >> "$GITHUB_OUTPUT"
          fi
        else
          node "$GITHUB_ACTION_PATH/scripts/local-scan.mjs" . > act101-scan-raw.json
          node "$GITHUB_ACTION_PATH/scripts/write-report.mjs" \
            --input act101-scan-raw.json \
            --out-dir act101-report \
            --sarif-status "$sarif_status"
          node "$GITHUB_ACTION_PATH/scripts/write-sarif.mjs" act101-report.json act101-results.sarif
          echo "scan_available=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Attach act101 report artifact
      uses: actions/upload-artifact@v7
      with:
        name: act101-report
        path: act101-report/
        if-no-files-found: error

    - name: Post act101 PR review comments
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/scripts/post-pr-comments.mjs"

    - name: Check GitHub code scanning availability
      id: code-scanning
      if: ${{ inputs.upload-sarif == 'true' && steps.report.outputs.scan_available == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        echo "available=false" >> "$GITHUB_OUTPUT"

        if [ -z "${GH_TOKEN:-}" ] || [ -z "${GITHUB_REPOSITORY:-}" ]; then
          {
            echo ""
            echo "SARIF upload skipped: GitHub token or repository context was unavailable."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        repo_file="$(mktemp)"
        repo_status="$(curl --silent --show-error --location \
          --output "$repo_file" \
          --write-out "%{http_code}" \
          --header "Authorization: Bearer ${GH_TOKEN}" \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}")"

        if [ "$repo_status" -lt 200 ] || [ "$repo_status" -ge 300 ]; then
          {
            echo ""
            echo "SARIF upload skipped: repository metadata request returned HTTP ${repo_status}."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        is_private="$(REPO_JSON="$(cat "$repo_file")" node -e 'const data = JSON.parse(process.env.REPO_JSON); process.stdout.write(data.private ? "true" : "false");')"
        if [ "$is_private" != "true" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        alerts_file="$(mktemp)"
        alerts_status="$(curl --silent --show-error --location \
          --output "$alerts_file" \
          --write-out "%{http_code}" \
          --header "Authorization: Bearer ${GH_TOKEN}" \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1")"

        if [ "$alerts_status" -ge 200 ] && [ "$alerts_status" -lt 300 ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo ""
          echo "SARIF upload skipped: GitHub code scanning is not enabled for this private repository."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload act101 SARIF
      if: ${{ inputs.upload-sarif == 'true' && steps.report.outputs.scan_available == 'true' && steps.code-scanning.outputs.available == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: act101-results.sarif
